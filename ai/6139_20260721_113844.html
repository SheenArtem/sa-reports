// Streamlit 接收 `streamlit:setFrameHeight` 訊息自動 resize（components.v1 支援）
function reportHeight() {
  var h = Math.max(
    document.documentElement.scrollHeight,
    document.body ? document.body.scrollHeight : 0
  );
  if (h > 0 && window.parent) {
    window.parent.postMessage({ type: 'streamlit:setFrameHeight', height: h + 40 }, '*');
  }
}
// 首次 render 延遲 + resize + scenario 切換時重量
window.addEventListener('load', function() { setTimeout(reportHeight, 500); setTimeout(reportHeight, 2000); });
window.addEventListener('resize', reportHeight);
// 觀察 DOM 變動（scenario 切換）自動重量
var obs = new MutationObserver(function() { setTimeout(reportHeight, 150); });
if (document.body) {
  obs.observe(document.body, { childList: true, subtree: true, attributes: true });
} else {
  window.addEventListener('DOMContentLoaded', function() {
    obs.observe(document.body, { childList: true, subtree: true, attributes: true });

}

      <div className="grid gap-4">{children}</div>
    </section>
  );
}

function Badge({ children, color = "sky" }) {
  const map = {
    sky: "bg-sky-900/40 text-sky-300 border-sky-700/40",
    red: "bg-red-900/40 text-red-300 border-red-700/40",
    amber: "bg-amber-900/40 text-amber-300 border-amber-700/40",
    emerald: "bg-emerald-900/40 text-emerald-300 border-emerald-700/40",
    violet: "bg-violet-900/40 text-violet-300 border-violet-700/40",
    slate: "bg-slate-800/60 text-slate-300 border-slate-600/40",
  };
  return <span className={`inline-block rounded border px-2 py-0.5 text-[10px] font-bold ${map[color] || map.sky}`}>{children}</span>;
}

function CustomTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="custom-tooltip">
      <p className="text-sky-300 font-bold">{label}</p>
      {payload.map((p, i) => (

  );
}

function verdictColor(v) {
  if (!v) return "slate";
  if (v.includes("強力買進") || v.includes("買進")) return "red";
  if (v.includes("減碼") || v.includes("賣出")) return "emerald";
  if (v.includes("觀望")) return "amber";
  return "slate";
}

function directionColor(d) {
  if (d === "bull" || d === "多" || d === "正") return "text-red-400";
  if (d === "bear" || d === "空" || d === "負") return "text-emerald-400";
  return "text-slate-300";
}

function severityColor(s) {
  if (s === "高") return "red";
  if (s === "中") return "amber";
  return "slate";
}

          </Card>

          {/* 月營收 */}
          {sum.monthly_revenue && sum.monthly_revenue.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">📅 近期月營收趨勢</h2>
              <ResponsiveContainer width="100%" height={220}>
                <ComposedChart data={sum.monthly_revenue} margin={{ top: 5, right: 10, left: -10, bottom: 5 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" />
                  <XAxis dataKey="month" tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <YAxis yAxisId="left" tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <YAxis yAxisId="right" orientation="right" tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar yAxisId="left" dataKey="rev" name="月營收(億)" fill="#38bdf8" radius={[4, 4, 0, 0]} />
                  <Line yAxisId="right" type="monotone" dataKey="yoy" name="年增率(%)" stroke="#f59e0b" strokeWidth={2} />
                </ComposedChart>
              </ResponsiveContainer>
            </Card>
          )}

          {/* EPS 情境 */}
          {val.eps_forecast && val.eps_forecast.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">📈 EPS 歷史 + 情境預測</h2>
              <div className="flex gap-2 mb-3">
                {["bear", "base", "bull"].map(s => (
                  <button key={s} onClick={() => setEpsScenario(s)}
                    className={`rounded px-2 py-1 text-xs ${epsScenario === s ? "bg-sky-700 text-white" : "bg-slate-800 text-slate-400"}`}>
                    {s === "bear" ? "🟢 熊" : s === "base" ? "🟡 基準" : "🔴 牛"}
                  </button>
                ))}
              </div>
              <ResponsiveContainer width="100%" height={200}>
                <AreaChart data={val.eps_forecast} margin={{ top: 5, right: 10, left: -10, bottom: 5 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" />
                  <XAxis dataKey="year" tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <YAxis tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <Tooltip content={<CustomTooltip />} />
                  {epsScenario === "bear" && <Area type="monotone" dataKey="bear" name="熊市EPS" stroke={COLORS.bear} fill={COLORS.bear + "30"} />}
                  {epsScenario === "base" && <Area type="monotone" dataKey="base" name="基準EPS" stroke={COLORS.base} fill={COLORS.base + "30"} />}
                  {epsScenario === "bull" && <Area type="monotone" dataKey="bull" name="牛市EPS" stroke={COLORS.bull} fill={COLORS.bull + "30"} />}
                </AreaChart>
              </ResponsiveContainer>
            </Card>
          )}
        </Section>

        {/* ========== 估值 ========== */}
        <Section title="💰 估值">
          {/* 3 情境矩陣 */}
          {val.scenarios && val.scenarios.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">📋 熊 / 基 / 牛情境目標價</h2>
              <div className="grid gap-3 md:grid-cols-3">
                {val.scenarios.map((s, i) => {
                  const isBull = s.scenario === "bull";
                  const isBear = s.scenario === "bear";
                  const bg = isBull ? "bg-red-900/20 border-red-700/40" : isBear ? "bg-emerald-900/20 border-emerald-700/40" : "bg-amber-900/20 border-amber-700/40";
                  const txt = isBull ? "text-red-300" : isBear ? "text-emerald-300" : "text-amber-300";
                  const label = isBull ? "🔴 牛市" : isBear ? "🟢 熊市" : "🟡 基準";
                  const upside = val.current_price ? ((s.target - val.current_price) / val.current_price * 100).toFixed(1) : null;
                  return (
                    <div key={i} className={`rounded-xl border p-4 ${bg}`}>
                      <p className={`text-xs font-bold ${txt} mb-2`}>{label}</p>
                      <p className="text-3xl font-black text-slate-100 mb-1">{s.target?.toLocaleString()}</p>
                      <p className="text-xs text-slate-400">元</p>
                      {upside && (
                        <p className={`text-xs mt-2 ${upside >= 0 ? "text-red-400" : "text-emerald-400"}`}>
                          {upside >= 0 ? "↑" : "↓"} {Math.abs(upside)}%
                        </p>
                      )}
                      <div className="mt-3 border-t border-slate-700 pt-2 text-[10px] text-slate-400 space-y-1">
                        <p>EPS: {s.eps_assumption}</p>
                        <p>PE: {s.pe_assumption}</p>
                        <p className="text-slate-500 italic">{s.trigger}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
              {val.current_price && (
                <p className="text-xs text-slate-500 mt-3">現價: <span className="text-sky-300 font-bold">{val.current_price.toLocaleString()} 元</span></p>
              )}
            </Card>
          )}

          {/* 本益比河流 */}
          {val.pe_history && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">📉 本益比區間定位</h2>
              <div className="grid grid-cols-4 gap-3 text-center">
                <div><p className="text-xs text-slate-500">歷史低</p><p className="text-xl font-bold text-emerald-400">{val.pe_history.low?.toFixed(1)}x</p></div>
                <div><p className="text-xs text-slate-500">中位數</p><p className="text-xl font-bold text-amber-400">{val.pe_history.median?.toFixed(1)}x</p></div>
                <div><p className="text-xs text-slate-500">當前</p><p className="text-xl font-bold text-sky-400">{val.pe_history.current?.toFixed(1)}x</p></div>
                <div><p className="text-xs text-slate-500">歷史高</p><p className="text-xl font-bold text-red-400">{val.pe_history.high?.toFixed(1)}x</p></div>
              </div>
            </Card>
          )}

          {/* 同業比較 */}
          {val.peer_comparison && val.peer_comparison.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">👥 同業估值比較</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="py-2 text-left text-slate-400">代號</th>
                      <th className="py-2 text-left text-slate-400">名稱</th>
                      <th className="py-2 text-right text-slate-400">PE</th>
                      <th className="py-2 text-right text-slate-400">PB</th>
                      <th className="py-2 text-right text-slate-400">殖利率</th>
                    </tr>
                  </thead>
                  <tbody>
                    {val.peer_comparison.map((p, i) => (
                      <tr key={i} className={`border-b border-slate-800/50 ${p.ticker === meta.ticker ? "bg-sky-900/20" : ""}`}>
                        <td className={`py-2 ${p.ticker === meta.ticker ? "text-sky-300 font-bold" : "text-slate-300"}`}>{p.ticker}</td>
                        <td className="py-2 text-slate-400">{p.name}</td>
                        <td className="py-2 text-right text-amber-300 font-mono">{p.pe?.toFixed(1) || "—"}</td>
                        <td className="py-2 text-right text-sky-300 font-mono">{p.pb?.toFixed(2) || "—"}</td>
                        <td className="py-2 text-right text-emerald-300 font-mono">{p.yield ? p.yield.toFixed(2) + "%" : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}
        </Section>

        {/* ========== 產業 ========== */}
        <Section title="🏭 產業">
          {/* 護城河摘要 */}
          {ind.moat && (
            <Card className="border-l-4 border-l-violet-500">
              <h2 className="text-sm font-bold text-violet-300 mb-2">🏰 護城河</h2>
              <p className="text-sm text-slate-200">{ind.moat}</p>
            </Card>
          )}

          {/* 營收結構 */}
          {ind.revenue_mix && ind.revenue_mix.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">📦 產品/營收結構</h2>
              <table className="w-full text-xs">
                <thead><tr className="text-slate-500 border-b border-slate-700">
                  <th className="py-2 text-left">產品線</th>
                  <th className="py-2 text-right">佔比</th>
                  <th className="py-2 text-center">趨勢</th>
                  <th className="py-2 text-left pl-4">說明</th>
                </tr></thead>
                <tbody>
                  {ind.revenue_mix.map((r, i) => (
                    <tr key={i} className="border-b border-slate-800/50">
                      <td className="py-2 text-slate-200 font-medium">{r.segment}</td>
                      <td className="py-2 text-right text-slate-300">{r.pct}%</td>
                      <td className="py-2 text-center">{r.trend === "up" ? <span className="text-red-400">↑</span> : r.trend === "down" ? <span className="text-emerald-400">↓</span> : <span className="text-slate-500">→</span>}</td>
                      <td className="py-2 text-slate-400 pl-4">{r.note}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          )}

          <div className="grid gap-4 md:grid-cols-2">
            {/* 供應鏈 */}
            {ind.supply_chain && ind.supply_chain.length > 0 && (
              <Card>
                <h2 className="text-sm font-bold text-sky-300 mb-3">🔗 供應鏈</h2>
                <div className="grid gap-2">
                  {ind.supply_chain.map((s, i) => (
                    <div key={i} className="flex gap-2 text-xs rounded-lg bg-slate-800/50 p-2">
                      <Badge color={s.tier === "upstream" ? "amber" : s.tier === "downstream" ? "sky" : "violet"}>
                        {s.tier === "upstream" ? "上游" : s.tier === "downstream" ? "下游" : "同業"}
                      </Badge>
                      <div className="flex-1">
                        <span className="text-slate-200 font-medium">{s.name}</span>
                        <span className="text-slate-500 ml-2">{s.relation}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            )}

            {/* 領先指標 */}
            {ind.lead_indicators && ind.lead_indicators.length > 0 && (
              <Card>
                <h2 className="text-sm font-bold text-sky-300 mb-3">🔍 領先指標</h2>
                <div className="grid gap-2">
                  {ind.lead_indicators.map((l, i) => (
                    <div key={i} className="rounded-lg bg-slate-800/50 p-3 text-xs">
                      <p className="text-slate-200 font-medium">{l.indicator}</p>
                      <div className="flex gap-3 mt-1">
                        <span className="text-slate-400">現況: {l.current}</span>
                        <span className="text-amber-300">訊號: {l.signal}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            )}
          </div>

          {/* 成長驅動力 */}
          {ind.growth_drivers && ind.growth_drivers.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">🚀 成長驅動力</h2>
              <div className="grid gap-2">
                {ind.growth_drivers.map((g, i) => (
                  <div key={i} className="flex gap-3 rounded-lg bg-slate-800/50 p-3 text-xs">
                    <div className="flex flex-col items-center gap-1">
                      <Badge color={g.status === "confirmed" ? "emerald" : "amber"}>
                        {g.status === "confirmed" ? "已確認" : "潛在"}
                      </Badge>
                      <span className="text-[10px] text-slate-500">{g.horizon}</span>
                    </div>
                    <div className="flex-1">
                      <p className="font-bold text-slate-200">{g.driver}</p>
                      <p className="text-slate-400 mt-1">{g.note}</p>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}
        </Section>

        {/* ========== 操作建議 + 左右側策略（從多空拉出來自成一段）========== */}
        <Section title="🎯 操作建議 + 左右側策略">
          {/* 投資建議 */}
          {bb.recommendation && (
            <Card className="border-l-4 border-l-sky-500">
              <h2 className="text-sm font-bold text-sky-300 mb-3">🎯 投資建議</h2>
              <div className="grid gap-3 md:grid-cols-2">
                {[
                  ["建議進場區間", bb.recommendation.entry_zone],
                  ["停損價位", bb.recommendation.stop_loss],
                  ["建議部位", bb.recommendation.position_size],
                  ["操作策略", bb.recommendation.strategy],
                ].map(([label, val], i) => (
                  <div key={i} className="rounded-lg bg-slate-800/60 p-3">
                    <p className="text-xs text-slate-500">{label}</p>
                    <p className="text-sm text-slate-200 mt-1">{val || "N/A"}</p>
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* 左側 | 右側策略（schema v1.1; 舊報告無此欄位自動略過） */}
          {D.left_right && (
            <div>
              <h2 className="text-sm font-bold text-amber-300 mb-3">⚖️ 左側 | 右側策略{D.left_right.posture ? <span className="text-slate-500 font-normal ml-2">{D.left_right.posture}</span> : null}</h2>
              <div className="grid gap-4 md:grid-cols-2">
                <Card className="border-l-4 border-l-emerald-500">
                  <h3 className="text-sm font-bold text-emerald-300 mb-2">左側 · 逆勢分批</h3>
                  {D.left_right.narrative_left && <p className="text-xs text-slate-400 mb-3">{D.left_right.narrative_left}</p>}
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="text-slate-500 border-b border-slate-700">
                        <th className="text-left py-1">回測</th>
                        <th className="text-right">價位</th>
                        <th className="text-right">隱含 PE</th>
                        <th className="text-right">動作</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(D.left_right.left_ladder || []).map((r, i) => {
                        const rprice = parseFloat(String(r.price).replace(/[^0-9.]/g, ""));
                        const aboveSpot = meta.last_price && rprice && rprice >= meta.last_price;
                        return (
                        <tr key={i} className="border-b border-slate-800">
                          <td className="py-1.5 text-amber-300">{r.fib}</td>
                          <td className="text-right font-bold text-slate-200">{r.price}</td>
                          <td className="text-right text-slate-400">{r.implied_pe}</td>
                          <td className="text-right text-red-400">{r.action}{aboveSpot ? <span className="block text-[10px] text-amber-400">↑ 現價已在此階下方 · 此批即刻可佈</span> : null}</td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {D.left_right.sizing_left && <p className="text-[10px] text-slate-500 mt-2">· {D.left_right.sizing_left}</p>}
                  {D.left_right.invalidation && <p className="text-[10px] text-red-400 mt-1">· {D.left_right.invalidation}</p>}
                </Card>
                <Card className="border-l-4 border-l-rose-500">
                  <h3 className="text-sm font-bold text-rose-300 mb-2">右側 · 順勢突破</h3>
                  {D.left_right.narrative_right && <p className="text-xs text-slate-400 mb-3">{D.left_right.narrative_right}</p>}
                  <div className="grid gap-2 text-xs">
                    {(D.left_right.right_entries || []).map((e, i) => (
                      <p key={i}><span className="text-rose-300 font-bold">{e.label}：</span><span className="text-slate-200">{e.condition}</span></p>
                    ))}
                    {D.left_right.catalysts && <p><span className="text-amber-300 font-bold">催化檢查點：</span><span className="text-slate-200">{D.left_right.catalysts}</span></p>}
                    {D.left_right.right_stop && <p><span className="text-emerald-300 font-bold">停損：</span><span className="text-slate-200">{D.left_right.right_stop}</span></p>}
                    {D.left_right.right_trailing && <p><span className="text-sky-300 font-bold">移動停利：</span><span className="text-slate-200">{D.left_right.right_trailing}</span></p>}
                  </div>
                  {D.left_right.sizing_right && <p className="text-[10px] text-slate-500 mt-2">· {D.left_right.sizing_right}</p>}
                </Card>
              </div>
              {/* 時間框架對接 (2026-06-22): 短線 vs 波段兩套停損不可混用, 靜態說明保證每份報告都顯示 */}
              <Card className="mt-4 border-l-4 border-l-amber-500 bg-amber-900/10">
                <p className="text-xs text-amber-200 leading-relaxed">
                  ⏱️ <b>兩套停損屬不同時間框架，請勿混用</b>：短線交易看上方「投資建議」的進場區間 + ATR 停損；
                  波段分批承接看「左側」Fib 階梯 + invalidation 停損。
                  採波段承接時 <b>不可</b> 用短線 ATR 停損提前砍掉尚未到位的加碼階（否則會在加碼階之前就被洗出場）；
                  純做短線單則用 ATR 停損、不放寬到 invalidation。
                </p>
              </Card>
            </div>
          )}
        </Section>

        {/* ========== 多空 ========== */}
        <Section title="⚖️ 多空">
          {/* 多空對照 */}
          <div className="grid gap-4 md:grid-cols-2">
            <Card className="border-l-4 border-l-red-500">
              <h2 className="text-sm font-bold text-red-300 mb-3">🔴 看多論點</h2>
              <div className="grid gap-2">
                {(bb.bull_points || []).map((p, i) => (
                  <div key={i} className="flex gap-2 text-xs">
                    <span className="text-red-400 font-bold">▲</span>
                    <div className="flex-1">
                      <p className="text-slate-200">{p.text}</p>
                      {p.weight && <p className="text-[10px] text-slate-500 mt-0.5">權重: {p.weight}</p>}
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            <Card className="border-l-4 border-l-emerald-500">
              <h2 className="text-sm font-bold text-emerald-300 mb-3">🟢 看空論點</h2>
              <div className="grid gap-2">
                {(bb.bear_points || []).map((p, i) => (
                  <div key={i} className="flex gap-2 text-xs">
                    <span className="text-emerald-400 font-bold">▼</span>
                    <div className="flex-1">
                      <p className="text-slate-200">{p.text}</p>
                      {p.weight && <p className="text-[10px] text-slate-500 mt-0.5">權重: {p.weight}</p>}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>

          {/* 風險排序 */}
          {bb.risks && bb.risks.length > 0 && (
            <Card className="border border-amber-700/40 bg-amber-900/10">
              <h2 className="text-sm font-bold text-amber-300 mb-3">⚠️ 風險排序（按衝擊 × 機率）</h2>
              <div className="grid gap-2">
                {bb.risks.map((r, i) => (
                  <div key={i} className="flex gap-3 rounded-lg bg-slate-800/50 p-3 text-xs">
                    <div className="flex flex-col items-center gap-1">
                      <Badge color={severityColor(r.severity)}>{r.severity}</Badge>
                      <Badge color="slate">{r.horizon}</Badge>
                    </div>
                    <div className="flex-1">
                      <p className="font-bold text-slate-200">{r.risk}</p>
                      <p className="text-slate-400 mt-1">{r.description}</p>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}
        </Section>

        {/* ========== 技術 ========== */}
        <Section title="📈 技術">
          {/* 觸發訊號 */}
          {tech.triggers && tech.triggers.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">🔔 觸發訊號列表</h2>
              <div className="grid gap-2 md:grid-cols-2">
                {tech.triggers.map((t, i) => (
                  <div key={i} className={`rounded-lg border p-3 ${t.type === "bull" ? "border-red-700/40 bg-red-900/10" : t.type === "bear" ? "border-emerald-700/40 bg-emerald-900/10" : "border-slate-700/40 bg-slate-800/30"}`}>
                    <div className="flex items-start justify-between gap-2">
                      <p className="text-xs text-slate-200 flex-1">{t.text}</p>
                      <Badge color={t.type === "bull" ? "red" : t.type === "bear" ? "emerald" : "slate"}>
                        {t.weight > 0 ? "+" : ""}{t.weight?.toFixed(1) || "—"}
                      </Badge>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* 技術指標表 */}
          {tech.signals && tech.signals.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">📊 技術面指標總覽</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="py-2 text-left text-slate-400">類別</th>
                      <th className="py-2 text-left text-slate-400">指標</th>
                      <th className="py-2 text-right text-slate-400">數值</th>
                      <th className="py-2 text-center text-slate-400">訊號</th>
                      <th className="py-2 text-left text-slate-400">說明</th>
                    </tr>
                  </thead>
                  <tbody>
                    {tech.signals.map((r, i) => (
                      <tr key={i} className="border-b border-slate-800/50">
                        <td className="py-2 text-slate-400">{r.category}</td>
                        <td className="py-2 text-slate-200">{r.indicator}</td>
                        <td className="py-2 text-right text-sky-300 font-mono">{r.value}</td>
                        <td className={`py-2 text-center font-bold ${directionColor(r.signal)}`}>{r.signal}</td>
                        <td className="py-2 text-slate-400">{r.note}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}
        </Section>

        {/* ========== 籌碼 ========== */}
        <Section title="🏦 籌碼">
          {/* 籌碼面 */}
          {chip.rows && chip.rows.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">🎯 籌碼面分析</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="py-2 text-left text-slate-400">類別</th>
                      <th className="py-2 text-left text-slate-400">數據</th>
                      <th className="py-2 text-center text-slate-400">方向</th>
                      <th className="py-2 text-left text-slate-400">影響</th>
                    </tr>
                  </thead>
                  <tbody>
                    {chip.rows.map((r, i) => (
                      <tr key={i} className="border-b border-slate-800/50">
                        <td className="py-2 text-slate-400">{r.category}</td>
                        <td className="py-2 text-slate-200">{r.data}</td>
                        <td className={`py-2 text-center font-bold ${directionColor(r.direction)}`}>{r.direction}</td>
                        <td className="py-2 text-slate-400">{r.impact}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}

          {/* 外資買賣超 */}
          {chip.foreign_flow && chip.foreign_flow.length > 0 && (
            <Card>
              <h2 className="text-sm font-bold text-sky-300 mb-3">💰 近期法人買賣超（張）</h2>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={chip.foreign_flow} margin={{ top: 5, right: 10, left: -10, bottom: 5 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e3a5f" />
                  <XAxis dataKey="date" tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <YAxis tick={{ fill: "#94a3b8", fontSize: 10 }} />
                  <Tooltip content={<CustomTooltip />} />
                  <ReferenceLine y={0} stroke="#64748b" />
                  <Bar dataKey="net" name="淨買超(張)" radius={[4, 4, 0, 0]}>
                    {chip.foreign_flow.map((d, i) => (
                      <Cell key={i} fill={d.net >= 0 ? COLORS.bull : COLORS.bear} />
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>
          )}
        </Section>

      </div>

      {versionWarn && (
        <div className="mb-4 px-4 py-2 bg-amber-900/30 border border-amber-700/40 rounded text-xs text-amber-300">
          ⚠️ Schema 版本不符：資料 v{dataVer} vs 模板 v{tmplVer}。部分欄位可能顯示不正常，建議重跑 AI 報告取得最新資料。
        </div>
      )}

      <footer className="border-t border-slate-800 py-6 text-center text-xs text-slate-600">
        <p>StockPulse AI Dashboard · {meta.ticker} · 生成於 {meta.generated_at}</p>
        <p className="mt-1 text-slate-700">僅供參考，不構成任何投資建議 · schema v{dataVer === "0.0" ? "legacy" : dataVer} · tmpl v{tmplVer}</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
